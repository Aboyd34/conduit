services:
  - type: web
    name: conduit
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx tsx server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: VITE_ONCHAINKIT_API_KEY
        sync: false
      # WebSocket URL is auto-detected from window.location at runtime
      # Only set this if you need to override (e.g. separate WS server)
      # - key: VITE_WS_URL
      #   value: wss://your-domain.onrender.com/ws
    healthCheckPath: /api/health
