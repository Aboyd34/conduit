services:
  - type: web
    name: conduit-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
    healthCheckPath: /health
    autoDeploy: true
