services:

  # ──────────────────────────────
  # 1. Backend — Express + WebSocket server
  # ──────────────────────────────
  - type: web
    name: conduit-server
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGIN
        value: https://cantc-ulive.live
    healthCheckPath: /health
    autoDeploy: true

  # ──────────────────────────────
  # 2. Frontend — Vite static site
  # ──────────────────────────────
  - type: static
    name: conduit-client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_WS_URL
        value: wss://conduit-server.onrender.com
      - key: VITE_API_URL
        value: https://conduit-server.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: no-referrer
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true
