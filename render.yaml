services:
  - type: web
    name: conduit
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: VITE_ONCHAINKIT_API_KEY
        sync: false
    healthCheckPath: /api/health
