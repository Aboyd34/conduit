services:

  # ──────────────────────────────
  # 1. Backend — Express + WebSocket server
  # ──────────────────────────────
  - type: web
    name: conduit-server
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGIN
        value: https://conduit-blush.vercel.app,https://cantc-ulive.live
    healthCheckPath: /health
    autoDeploy: true
