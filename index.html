<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conduit — Communication Without Witnesses</title>
    <style>
      .conduit-disclaimer {
        position: sticky;
        top: 0;
        z-index: 10000;
        background: linear-gradient(135deg, #FF6B6B, #FFD93D);
        color: #000;
        padding: 14px 20px;
        font-family: Arial, sans-serif;
        font-size: 15px;
        font-weight: bold;
        text-align: center;
        border-bottom: 4px solid #FF0000;
        animation: glow 1.5s infinite alternate;
      }
      @keyframes glow {
        0% { box-shadow: 0 2px 8px rgba(255,0,0,0.5); }
        100% { box-shadow: 0 2px 20px rgba(255,107,107,0.9); }
      }
      #cookieBanner {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        color: #fff;
        padding: 16px 20px;
        z-index: 9999;
        border-top: 4px solid #FFD93D;
        font-family: Arial, sans-serif;
        font-size: 14px;
        text-align: center;
        display: none;
      }
      #cookieBanner a { color: #FFD93D; }
      .cb-btn { padding: 10px 22px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin: 4px; }
      .cb-accept { background: #4CAF50; color: #fff; }
      .cb-reject { background: #f44336; color: #fff; }
      .cb-prefs  { background: #2196F3; color: #fff; }
    </style>
  </head>
  <body>

    <!-- STICKY DISCLAIMER: TOP OF EVERY PAGE -->
    <div class="conduit-disclaimer">
      🚫 STRICTLY PROHIBITED: Minors/CSAM &nbsp;|&nbsp; Sex Trafficking &nbsp;|&nbsp; Hate Speech &nbsp;|&nbsp; Bullying &nbsp;—&nbsp;
      ALL posts AUTO-SCANNED. Violations = PERMANENT BAN + LAW ENFORCEMENT REPORT. Must be 18+ verified.
    </div>

    <!-- APP ROOT -->
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>

    <!-- COOKIE BANNER -->
    <div id="cookieBanner">
      🍪 <strong>We use cookies for essential functions.</strong>
      <a href="/privacy-policy.html">Privacy Policy</a> |
      <a href="/cookie-policy.html">Cookie Policy</a><br><br>
      <button class="cb-btn cb-accept" onclick="setConsent(true)">Accept All</button>
      <button class="cb-btn cb-reject" onclick="setConsent(false)">Reject</button>
      <button class="cb-btn cb-prefs"  onclick="openPrefs()">Preferences</button>
    </div>

    <!-- COOKIE CONSENT JS -->
    <script>
      (function () {
        const KEY = 'conduitConsent';
        const banner = document.getElementById('cookieBanner');
        if (!localStorage.getItem(KEY)) {
          banner.style.display = 'block';
          if (typeof gtag !== 'undefined') gtag('consent', 'default', { analytics_storage: 'denied' });
        }
        window.setConsent = function (accept) {
          localStorage.setItem(KEY, accept ? 'accept' : 'reject');
          banner.style.display = 'none';
          if (typeof gtag !== 'undefined') gtag('consent', 'update', { analytics_storage: accept ? 'granted' : 'denied' });
        };
        window.openPrefs = function () {
          const ok = confirm('Enable analytics cookies?');
          setConsent(ok);
        };
      })();
    </script>

  </body>
</html>
