<!DOCTYPE html>
<html>
<head><title>Cookie Banner</title></head>
<body>
<!-- COOKIE BANNER: Paste into every page <body> -->
<div id="cookieConsentBanner" style="position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#FF6B6B,#FFD93D);color:#000;padding:20px;z-index:10000;border-top:5px solid #FF0000;box-shadow:0 -5px 20px rgba(0,0,0,0.4);font-family:Arial,sans-serif;font-size:16px;font-weight:bold;text-align:center;">
  <div style="margin-bottom:10px;">🍪 <strong>We use cookies for essential functions.</strong>
    <a href="/privacy-policy.html" target="_blank" style="color:#000;text-decoration:underline;">Privacy Policy</a> |
    <a href="/cookie-policy.html" target="_blank" style="color:#000;text-decoration:underline;">Cookie Policy</a>
  </div>
  <div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap;">
    <button onclick="setConsent(true)" style="background:#4CAF50;color:white;padding:12px 24px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;min-width:120px;">Accept All</button>
    <button onclick="setConsent(false)" style="background:#f44336;color:white;padding:12px 24px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;min-width:120px;">Reject</button>
    <button onclick="openPrefs()" style="background:#2196F3;color:white;padding:12px 24px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;min-width:120px;">Preferences</button>
  </div>
</div>
<div id="caLink" style="position:fixed;bottom:80px;right:20px;background:#2196F3;color:white;padding:10px;border-radius:5px;font-size:14px;z-index:9999;display:none;">
  <a href="/privacy-policy.html#do-not-sell" style="color:white;">CA: Do Not Sell My Info</a>
</div>
<script>
(function(){
  const KEY='cantcConsent';
  const banner=document.getElementById('cookieConsentBanner');
  if(!localStorage.getItem(KEY)){banner.style.display='block';if(typeof gtag!=='undefined')gtag('consent','default',{'analytics_storage':'denied'});}
  else{banner.style.display='none';}
  window.setConsent=function(accept){
    localStorage.setItem(KEY,accept?'accept':'reject');
    banner.style.display='none';
    if(typeof gtag!=='undefined')gtag('consent','update',{'analytics_storage':accept?'granted':'denied'});
  };
  window.openPrefs=function(){
    const p=confirm('Enable analytics cookies?');
    setConsent(p);
  };
})();
</script>
</body>
</html>
